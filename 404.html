<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | VPhone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Background Setup */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #010101; /* Hitam pekat khas VPhone */
      color: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Logo VPhone di atas */
    .logo-mark {
      position: absolute;
      top: 40px;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
    }

    /* Efek Cahaya Redup di Background */
    .ambient-glow {
      position: absolute;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(41, 151, 255, 0.08) 0%, rgba(0,0,0,0) 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* Kontainer Konten */
    .content-wrapper {
      z-index: 1;
      padding: 0 20px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typography Raksasa */
    h1 {
      font-size: 12rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -8px;
      /* Teks gradasi metalik premium */
      background: linear-gradient(180deg, #ffffff 0%, #4b4b4b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      color: #86868b;
      margin-bottom: 40px;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    /* Tombol Biru Aksent */
    .btn-home {
      display: inline-block;
      padding: 14px 32px;
      background: #2997ff; /* Warna biru utama VPhone */
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      background: #0071e3;
      transform: scale(1.05);
    }

    /* Responsif untuk Layar HP */
    @media (max-width: 768px) {
      h1 { font-size: 7rem; letter-spacing: -3px; }
      h2 { font-size: 1.5rem; }
      p { font-size: 1rem; max-width: 90%; }
      .ambient-glow { width: 100vw; height: 100vw; }
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>
  
  <div class="logo-mark">VPhone.</div>

  <div class="content-wrapper">
    <h1>404</h1>
    <h2>Kami kehilangan sinyal.</h2>
    <p>Halaman yang Anda cari tidak dapat ditemukan karena masih portofolio.</p>
    <a href="hero/indexhero1.html" class="btn-home">Kembali ke Beranda</a>
  </div>

</body>
</html>
